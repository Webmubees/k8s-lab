apiVersion: v1
kind: Pod

metadata:
  name: storage-demo-2

spec:
  containers:
  - name: app
    image: busybox

    command:
      - sh
      - -c
      - "sleep 3600"

    volumeMounts:
    - name: my-volume
      mountPath: /storage

  volumes:
  - name: my-volume
    persistentVolumeClaim:
      claimName: demo-pvc
apiVersion: v1
kind: Pod

metadata:
  name: storage-demo

spec:
  containers:
  - name: app
    image: busybox

    command:
      - sh
      - -c
      - "sleep 3600"

    volumeMounts:
    - mountPath: /storage
      name: my-volume

  volumes:
  - name: my-volume
    persistentVolumeClaim:
      claimName: demo-pvc
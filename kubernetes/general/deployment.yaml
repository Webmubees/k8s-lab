apiVersion: apps/v1
kind: Deployment

metadata:
  name: general-service

spec:
  replicas: 3

  selector:
    matchLabels:
      app: general-service

  template:
    metadata:
      labels:
        app: general-service

    spec:
      containers:
      - name: general-service
        image: general-service:v2
        imagePullPolicy: Never

        ports:
        - containerPort: 8000

        envFrom:
          - configMapRef:
              name: general-config
          
          - secretRef:
              name: general-secret
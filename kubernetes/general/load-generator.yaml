apiVersion: apps/v1
kind: Deployment

metadata:
  name: load-generator

spec:
  replicas: 3

  selector:
    matchLabels:
      app: load-generator

  template:
    metadata:
      labels:
        app: load-generator

    spec:
      containers:
      - name: busybox
        image: busybox

        command:
        - /bin/sh
        - -c
        - |
          while true
          do
            wget -q -O- http://general-service/cpu
          done